###############################################################################
# QuantEmbrace — Build: Docker → ECR
#
# Triggers: merge to main (after CI passes).
#
# Builds one Docker image per service and pushes to ECR.
# Tags strategy: <sha> (immutable) + "latest-<env>" (mutable pointer).
#
# Required secrets:
#   AWS_DEPLOY_ROLE_ARN   — IAM role assumed via OIDC for ECR push
#   AWS_ECR_REGISTRY      — ECR registry URL (e.g. 123456789.dkr.ecr.ap-south-1.amazonaws.com)
###############################################################################

name: Build

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "Dockerfile*"
      - "requirements*.txt"
      - ".github/workflows/build.yml"

permissions:
  id-token: write   # Required for OIDC AWS auth
  contents: read

env:
  PYTHON_VERSION: "3.11"
  AWS_DEFAULT_REGION: ap-south-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Determine which services changed (skip unchanged builds)
  # ─────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      data_ingestion: ${{ steps.filter.outputs.data_ingestion }}
      strategy_engine: ${{ steps.filter.outputs.strategy_engine }}
      execution_engine: ${{ steps.filter.outputs.execution_engine }}
      risk_engine: ${{ steps.filter.outputs.risk_engine }}
      ai_engine: ${{ steps.filter.outputs.ai_engine }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need previous commit for diff

      - name: Detect service changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            data_ingestion:
              - 'services/data_ingestion/**'
              - 'services/shared/**'
              - 'requirements*.txt'
              - 'Dockerfile'
            strategy_engine:
              - 'services/strategy_engine/**'
              - 'services/shared/**'
              - 'requirements*.txt'
              - 'Dockerfile'
            execution_engine:
              - 'services/execution_engine/**'
              - 'services/shared/**'
              - 'requirements*.txt'
              - 'Dockerfile'
            risk_engine:
              - 'services/risk_engine/**'
              - 'services/shared/**'
              - 'requirements*.txt'
              - 'Dockerfile'
            ai_engine:
              - 'services/ai_engine/**'
              - 'services/shared/**'
              - 'requirements*.txt'
              - 'Dockerfile'

  # ─────────────────────────────────────────────────────────────────────────
  # Build + push each service (matrix, skips unchanged)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: data_ingestion
            changed: ${{ needs.detect-changes.outputs.data_ingestion }}
          - service: strategy_engine
            changed: ${{ needs.detect-changes.outputs.strategy_engine }}
          - service: execution_engine
            changed: ${{ needs.detect-changes.outputs.execution_engine }}
          - service: risk_engine
            changed: ${{ needs.detect-changes.outputs.risk_engine }}
          - service: ai_engine
            changed: ${{ needs.detect-changes.outputs.ai_engine }}

    # Skip if service didn't change (saves ~5 min per service)
    if: matrix.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          REGISTRY="${{ secrets.AWS_ECR_REGISTRY }}"
          SERVICE="${{ matrix.service }}"
          echo "image_uri=${REGISTRY}/quantembrace-${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=latest-staging" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          tags: |
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false   # Reduce manifest size for ECS compatibility

      - name: Output image URI
        run: |
          echo "Built: ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.tag_sha }}"

  # ─────────────────────────────────────────────────────────────────────────
  # Gate: all builds must succeed before deploy workflows can trigger
  # ─────────────────────────────────────────────────────────────────────────
  build-complete:
    name: Build gate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Check all builds passed
        run: |
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "One or more service builds failed"
            exit 1
          fi
          echo "All builds passed (or skipped — no changes)"
