###############################################################################
# QuantEmbrace — CI: Lint + Test
#
# Triggers: every push and pull-request that touches Python, Terraform,
#           Docker, or workflow files themselves.
#
# Jobs:
#   lint        ruff + black --check + isort --check
#   test-unit   pytest (services/**/tests/unit) against LocalStack
#   test-infra  terraform validate + tflint on every module
###############################################################################

name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "services/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "requirements*.txt"
      - "Dockerfile*"
      - ".github/workflows/**"
  pull_request:
    branches: ["main", "staging"]
    paths:
      - "services/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "requirements*.txt"
      - "Dockerfile*"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AWS_DEFAULT_REGION: ap-south-1
  # LocalStack endpoint used by integration tests
  AWS_ENDPOINT_URL: http://localhost:4566
  ENVIRONMENT: test
  DYNAMODB_TABLE_PREFIX: quantembrace-test
  S3_BUCKET_DATA: quantembrace-test-tick-data
  S3_BUCKET_LOGS: quantembrace-test-trading-logs

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff · black · isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff black isort

      - name: ruff check
        run: ruff check services/ tests/ scripts/ --output-format=github

      - name: black check
        run: black --check --line-length 100 services/ tests/ scripts/

      - name: isort check
        run: isort --check-only --profile black services/ tests/ scripts/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb,sqs,sns,secretsmanager
          DEFAULT_REGION: ap-south-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Create LocalStack resources
        run: |
          python scripts/setup_local_tables.py
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: ${{ env.AWS_DEFAULT_REGION }}
          AWS_ENDPOINT_URL: ${{ env.AWS_ENDPOINT_URL }}

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -p no:warnings
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: ${{ env.AWS_DEFAULT_REGION }}
          AWS_ENDPOINT_URL: ${{ env.AWS_ENDPOINT_URL }}
          # Stub broker creds for tests — real keys never in CI
          KITE_API_KEY: test_kite_key
          KITE_API_SECRET: test_kite_secret
          ALPACA_API_KEY: test_alpaca_key
          ALPACA_API_SECRET: test_alpaca_secret
          ALPACA_BASE_URL: https://paper-api.alpaca.markets

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Terraform validate
  # ─────────────────────────────────────────────────────────────────────────
  test-infra:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint
    if: |
      contains(github.event.head_commit.modified, 'infra/') ||
      github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Validate dev environment
        working-directory: infra/terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate staging environment
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate prod environment
        working-directory: infra/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate
