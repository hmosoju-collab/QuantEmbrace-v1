# ─────────────────────────────────────────────────────────────────────────────
# UNIVERSE FILTERS (applied on top of active: true)
# Use these to dynamically exclude instruments without editing each entry
# ─────────────────────────────────────────────────────────────────────────────
filters:
  nse:
    exclude_sectors: []          # e.g. ["Metals"] to exclude all metal stocks
    max_instruments: 20          # Safety cap — never watch more than 20 NSE symbols at once
    min_lot_size: 1
    max_lot_size: 1000           # Exclude instruments with very large lots (too capital-intensive)

  us:
    exclude_sectors: []
    max_instruments: 15          # Cap for US — fewer symbols, higher quality
    min_price: 10.0              # Exclude penny stocks
    max_price: 10000.0           # Exclude Berkshire-style high-price stocks
