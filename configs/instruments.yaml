# QuantEmbrace — Instrument Universe Configuration
#
# This file defines WHICH stocks the system watches and is allowed to trade.
# The algorithm auto-decides WHEN to trade based on momentum signals.
#
# HOW IT WORKS:
#   1. You set active: true for stocks you want the system to watch
#   2. Data ingestion subscribes to those symbols automatically
#   3. The strategy engine runs momentum analysis on all active symbols
#   4. A BUY or SELL signal is only generated when the algorithm detects
#      a crossover — you don't pick when to trade, only which universe to watch
#
# TO ADD A STOCK:    Add an entry below with active: true
# TO REMOVE A STOCK: Set active: false (don't delete — keeps history)
# TO PAUSE A STOCK:  Set active: false temporarily
#
# Last updated: 2026-04-24

# ─────────────────────────────────────────────────────────────────────────────
# NSE INDIA — Nifty 50 Universe
# Market hours: 09:15 – 15:30 IST (Monday to Friday)
# Broker: Zerodha Kite Connect
# ─────────────────────────────────────────────────────────────────────────────
nse:
