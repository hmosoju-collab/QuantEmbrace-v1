    name: momentum
    short_window: 10       # 10-tick/bar short moving average
    long_window: 50        # 50-tick/bar long moving average
    min_confidence: 0.60   # Only trade if confidence score ≥ 0.60
    quantity: 20           # Default shares per signal (overridden by lot_size below)

